name: Build Apps

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_NAME: ${{ github.ref_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: android
          - os: macos-latest
            target: ios

    steps:
      - name: Checkout release repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Checkout private source repository
        uses: actions/checkout@v4
        with:
          repository: lycorisor/tapp-flutter
          token: ${{ secrets.PRIVATE_REPO_READ_TOKEN }}
          path: source
          fetch-depth: 0

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable desktop
        if: ${{ matrix.target == 'windows' || matrix.target == 'macos' || matrix.target == 'linux' }}
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            flutter config --enable-windows-desktop
          elif [[ "${{ matrix.target }}" == "macos" ]]; then
            flutter config --enable-macos-desktop
          else
            flutter config --enable-linux-desktop
          fi

      - name: Install Linux build dependencies
        if: ${{ matrix.target == 'linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libgtk-3-dev libmpv-dev

      - name: Install dependencies
        working-directory: source
        run: flutter pub get

      - name: Build
        working-directory: source
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            flutter build windows --release
          elif [[ "${{ matrix.target }}" == "macos" ]]; then
            flutter build macos --release
          elif [[ "${{ matrix.target }}" == "linux" ]]; then
            flutter build linux --release
          elif [[ "${{ matrix.target }}" == "android" ]]; then
            flutter build apk --release --split-per-abi
          else
            flutter build ios --release --no-codesign
          fi

      - name: Rename Android APKs by ABI
        if: ${{ matrix.target == 'android' }}
        working-directory: source
        shell: bash
        run: |
          cd build/app/outputs/flutter-apk
          for apk in app-*-release.apk; do
            if [[ "$apk" == *"arm64-v8a"* ]]; then
              mv "$apk" "tapp-${RELEASE_NAME}-arm64.apk"
            elif [[ "$apk" == *"armeabi-v7a"* ]]; then
              mv "$apk" "tapp-${RELEASE_NAME}-armeabi-v7a.apk"
            elif [[ "$apk" == *"x86_64"* ]]; then
              mv "$apk" "tapp-${RELEASE_NAME}-x86_64.apk"
            else
              mv "$apk" "tapp-${RELEASE_NAME}-${apk#app-}"
            fi
          done

      - name: Compress macOS App
        if: ${{ matrix.target == 'macos' }}
        working-directory: source
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r tapp-${RELEASE_NAME}-macos.zip *.app

      - name: Compress Windows App
        if: ${{ matrix.target == 'windows' }}
        working-directory: source
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\x64\runner\Release\tapp-$env:RELEASE_NAME-windows.zip

      - name: Compress Linux App
        if: ${{ matrix.target == 'linux' }}
        working-directory: source
        shell: bash
        run: |
          cd build/linux/x64/release
          zip -r tapp-${RELEASE_NAME}-linux.zip bundle

      - name: Compress iOS App
        if: ${{ matrix.target == 'ios' }}
        working-directory: source
        shell: bash
        run: |
          cd build/ios/iphoneos
          zip -r tapp-${RELEASE_NAME}-ios.zip Runner.app

      - name: Upload Windows artifact
        if: ${{ matrix.target == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-windows
          path: source/build/windows/x64/runner/Release/tapp-${{ env.RELEASE_NAME }}-windows.zip

      - name: Upload macOS artifact
        if: ${{ matrix.target == 'macos' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-macos
          path: source/build/macos/Build/Products/Release/tapp-${{ env.RELEASE_NAME }}-macos.zip

      - name: Upload Linux artifact
        if: ${{ matrix.target == 'linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-linux
          path: source/build/linux/x64/release/tapp-${{ env.RELEASE_NAME }}-linux.zip

      - name: Upload Android artifact
        if: ${{ matrix.target == 'android' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-android-split
          path: source/build/app/outputs/flutter-apk/tapp-${{ env.RELEASE_NAME }}-*.apk

      - name: Upload iOS artifact
        if: ${{ matrix.target == 'ios' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-ios
          path: source/build/ios/iphoneos/tapp-${{ env.RELEASE_NAME }}-ios.zip

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN || github.token }}
          files: |
            dist/tapp-windows/tapp-${{ env.RELEASE_NAME }}-windows.zip
            dist/tapp-macos/tapp-${{ env.RELEASE_NAME }}-macos.zip
            dist/tapp-linux/tapp-${{ env.RELEASE_NAME }}-linux.zip
            dist/tapp-android-split/tapp-${{ env.RELEASE_NAME }}-*.apk
            dist/tapp-ios/tapp-${{ env.RELEASE_NAME }}-ios.zip
