name: Build Apps

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:

  build:
    name: Build ${{ matrix.target }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: windows
          - os: macos-latest
            target: macos
          - os: ubuntu-latest
            target: linux
          - os: ubuntu-latest
            target: android
          - os: macos-latest
            target: ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          cache: true


      - name: Enable desktop
        if: ${{ matrix.target == 'windows' || matrix.target == 'macos' || matrix.target == 'linux' }}
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            flutter config --enable-windows-desktop
          elif [[ "${{ matrix.target }}" == "macos" ]]; then
            flutter config --enable-macos-desktop
          else
            flutter config --enable-linux-desktop
          fi

      - name: Install Linux build dependencies
        if: ${{ matrix.target == 'linux' }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build pkg-config libgtk-3-dev libmpv-dev


      - name: Install dependencies
        run: flutter pub get


      - name: Build
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == "windows" ]]; then
            flutter build windows --release
          elif [[ "${{ matrix.target }}" == "macos" ]]; then
            flutter build macos --release
          elif [[ "${{ matrix.target }}" == "linux" ]]; then
            flutter build linux --release
          elif [[ "${{ matrix.target }}" == "android" ]]; then
            flutter build apk --release --split-per-abi
          else
            flutter build ios --release --no-codesign
          fi

      - name: Compress macOS App
        if: ${{ matrix.target == 'macos' }}
        shell: bash
        run: |
          cd build/macos/Build/Products/Release
          zip -r tapp-macos.zip *.app

      - name: Compress Windows App
        if: ${{ matrix.target == 'windows' }}
        shell: pwsh
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath build\windows\x64\runner\Release\tapp-windows.zip

      - name: Compress Linux App
        if: ${{ matrix.target == 'linux' }}
        shell: bash
        run: |
          cd build/linux/x64/release
          zip -r tapp-linux.zip bundle

      - name: Compress iOS App
        if: ${{ matrix.target == 'ios' }}
        shell: bash
        run: |
          cd build/ios/iphoneos
          zip -r tapp-ios.zip Runner.app

      - name: Upload Windows artifact
        if: ${{ matrix.target == 'windows' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-windows
          path: build/windows/x64/runner/Release/tapp-windows.zip


      - name: Upload macOS artifact
        if: ${{ matrix.target == 'macos' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-macos
          path: build/macos/Build/Products/Release/tapp-macos.zip


      - name: Upload Linux artifact
        if: ${{ matrix.target == 'linux' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-linux
          path: build/linux/x64/release/tapp-linux.zip


      - name: Upload Android artifact
        if: ${{ matrix.target == 'android' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-android-split
          path: build/app/outputs/flutter-apk/app-*-release.apk


      - name: Upload iOS artifact
        if: ${{ matrix.target == 'ios' }}
        uses: actions/upload-artifact@v4
        with:
          name: tapp-ios
          path: build/ios/iphoneos/tapp-ios.zip

      - name: Publish GitHub Release (Windows)
        if: ${{ matrix.target == 'windows' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/x64/runner/Release/tapp-windows.zip

      - name: Publish GitHub Release (macOS)
        if: ${{ matrix.target == 'macos' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/macos/Build/Products/Release/tapp-macos.zip

      - name: Publish GitHub Release (Linux)
        if: ${{ matrix.target == 'linux' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/linux/x64/release/tapp-linux.zip

      - name: Publish GitHub Release (Android)
        if: ${{ matrix.target == 'android' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-*-release.apk


      - name: Publish GitHub Release (iOS)
        if: ${{ matrix.target == 'ios' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          files: build/ios/iphoneos/tapp-ios.zip
